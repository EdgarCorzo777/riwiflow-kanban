<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Riwiflow</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#e3e1ed",
              tertiary: "#6b3000",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed-variant": "#5b00c5",
              "on-tertiary-container": "#ffc19e",
              "surface-container-low": "#f9f1ff",
              secondary: "#5d5d67",
              "on-secondary-container": "#64636d",
              "inverse-on-surface": "#f6eefc",
              "surface-dim": "#dfd7e5",
              error: "#ba1a1a",
              "secondary-fixed-dim": "#c7c5d1",
              "on-primary-container": "#dac5ff",
              "surface-variant": "#e8e0ee",
              surface: "#fef7ff",
              "inverse-primary": "#d3bbff",
              "on-error": "#ffffff",
              "surface-container-highest": "#e8e0ee",
              "secondary-container": "#e3e1ed",
              "on-primary-fixed": "#250059",
              "on-secondary-fixed-variant": "#46464f",
              "surface-container": "#f3ebf9",
              "primary-container": "#6d28d9",
              "outline-variant": "#ccc3d7",
              "primary-fixed": "#ebddff",
              "on-tertiary": "#ffffff",
              "surface-container-high": "#ede5f3",
              "surface-bright": "#fef7ff",
              "primary-fixed-dim": "#d3bbff",
              "on-primary": "#ffffff",
              outline: "#7b7486",
              "on-secondary": "#ffffff",
              "on-tertiary-fixed-variant": "#743400",
              background: "#fef7ff",
              "tertiary-container": "#8f4200",
              "on-secondary-fixed": "#1a1b23",
              "error-container": "#ffdad6",
              "on-background": "#1d1a24",
              primary: "#5300b7",
              "surface-tint": "#7331df",
              "on-error-container": "#93000a",
              "on-surface-variant": "#4a4455",
              "tertiary-fixed-dim": "#ffb68b",
              "on-surface": "#1d1a24",
              "on-tertiary-fixed": "#321300",
              "tertiary-fixed": "#ffdbc8",
              "inverse-surface": "#332f39",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              md: "16px",
              xxl: "48px",
              xl: "32px",
              xs: "4px",
              sm: "8px",
              gutter: "24px",
              lg: "24px",
              "margin-mobile": "16px",
            },
            fontFamily: {
              "display-lg-mobile": ["Inter"],
              "body-sm": ["Inter"],
              "label-sm": ["Inter"],
              "title-sm": ["Inter"],
              "headline-md": ["Inter"],
              "display-lg": ["Inter"],
              "body-md": ["Inter"],
              "label-md": ["Inter"],
            },
            fontSize: {
              "display-lg-mobile": ["30px", { lineHeight: "38px", letterSpacing: "-0.02em", fontWeight: "600" }],
              "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }],
              "label-sm": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
              "title-sm": ["18px", { lineHeight: "28px", fontWeight: "500" }],
              "headline-md": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "600" }],
              "display-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "600" }],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "label-md": ["14px", { lineHeight: "20px", fontWeight: "500" }],
            },
          },
        },
      };
    </script>
    <style>
      body { font-family: "Inter", sans-serif; }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        display: inline-block;
        vertical-align: middle;
        line-height: 1;
      }
      /* ── Login styles ── */
      .input-focus-ring:focus {
        outline: none;
        border-color: #5300b7;
        box-shadow: 0 0 0 2px #ebddff;
      }
      /* ── Board styles ── */
      .kanban-column { min-width: 280px; }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #ccc3d7; border-radius: 10px; }
      .task-card:hover { transform: translateY(-2px); transition: all 0.2s ease; }
      /* ── SPA view transitions ── */
      #view-login, #view-board { transition: opacity 0.2s ease; }
      .view-hidden { display: none !important; }
    </style>
  </head>

  <!-- ROOT: body switches between login layout and board layout -->
  <body id="app-body">

    <!-- ═══════════════════════════════════════════════════════
         VIEW: LOGIN
         Same markup as original login.html, wrapped in a div
    ════════════════════════════════════════════════════════ -->
    <div id="view-login" class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col">
      <main class="flex-grow flex items-center justify-center px-gutter py-xxl">
        <div class="w-full max-w-[440px] space-y-xl">
          <!-- Brand -->
          <div class="text-center space-y-md">
            <h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Riwiflow</h1>
            <p class="font-body-md text-body-md text-on-surface-variant">Sign in to your professional workspace</p>
          </div>
          <!-- Card -->
          <div class="bg-surface-container-lowest border border-outline-variant p-xl rounded-xl space-y-lg transition-all">
            <form class="space-y-lg" id="loginForm" onsubmit="return false;">
              <!-- Email -->
              <div class="space-y-sm">
                <label class="font-label-md text-label-md text-on-surface" for="email">Email address</label>
                <div class="relative">
                  <input class="w-full px-md py-md bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface input-focus-ring transition-all placeholder:text-outline"
                    id="email" name="email" placeholder="name@company.com" required type="email" />
                </div>
              </div>
              <!-- Password -->
              <div class="space-y-sm">
                <div class="flex justify-between items-center">
                  <label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
                  <a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot password?</a>
                </div>
                <div class="relative">
                  <input class="w-full px-md py-md bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface input-focus-ring transition-all placeholder:text-outline"
                    id="password" name="password" placeholder="••••••••" required type="password" />
                </div>
              </div>
              <!-- CTA -->
              <div class="pt-sm">
                <button class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-md px-lg rounded-lg transition-all active:scale-[0.98] duration-150 flex items-center justify-center gap-sm" type="submit">
                  Login
                  <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </button>
              </div>
            </form>
            <!-- Divider -->
            <div class="relative py-sm">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-outline-variant"></div>
              </div>
              <div class="relative flex justify-center text-label-sm">
                <span class="bg-surface-container-lowest px-md text-outline font-label-sm uppercase tracking-widest">or continue with</span>
              </div>
            </div>
            <!-- Google -->
            <div class="grid grid-cols-1 gap-md">
              <button class="w-full flex items-center justify-center gap-md py-md border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors duration-200">
                <img alt="Google" class="w-4 h-4 opacity-80"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4MKWoYfBIsxFaqncSN9YxR9mdXQGZNMC1EJDT5yAh5A5R7NXO24MRfA2bF0BxpLFdOJLIlAof80HOr4HokeP6RalmMOUP2rfQdl3XiQ4NoHX37q7XV75Y8mHyjT-0PziGdPkI9qXCMmNzMVVN-ZQUdWwMo6nYIE9qAI22sos0F8nFKx2zlwN1HYzEky_3nI6UP8FAT6bwNH0p2-0Yi3teyjDUPvFHOJwCiAgh-b14qx97Qfr8mlseGFe9mamhHBn8i9WZVkS0Zdjc" />
                Sign in with Google
              </button>
            </div>
          </div>
          <!-- Footer -->
          <div class="text-center">
            <p class="font-body-sm text-body-sm text-on-surface-variant">
              Don't have an account?
              <a class="text-primary font-label-md hover:underline" href="#">Create an account</a>
            </p>
          </div>
        </div>
      </main>
      <!-- Atmospheric background -->
      <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-fixed/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-primary-fixed/10 blur-[100px] rounded-full"></div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         VIEW: BOARD
         Same markup as original board.html, wrapped in a div
    ════════════════════════════════════════════════════════ -->
    <div id="view-board" class="view-hidden bg-background text-on-background overflow-hidden h-screen flex w-full">

      <!-- SideNavBar -->
      <aside class="hidden md:flex flex-col pt-md pb-xl gap-xs h-full bg-surface-container-low border-r border-outline-variant w-[280px] shrink-0">
        <div class="px-gutter mb-xl">
          <h1 class="font-headline-md text-headline-md font-bold text-primary">Riwiflow</h1>
          <p class="font-body-sm text-body-sm text-on-surface-variant">Product Team</p>
        </div>
        <nav class="flex-1 space-y-1">
          <a class="flex items-center bg-primary-fixed text-on-primary-fixed-variant rounded-lg mx-2 px-4 py-3 font-body-sm text-body-sm transition-all scale-[0.98]" href="#">
            <span class="material-symbols-outlined mr-3">dashboard</span><span>Dashboard</span>
          </a>
          <a class="flex items-center text-secondary hover:text-primary hover:bg-primary-container/10 px-4 py-3 mx-2 font-body-sm text-body-sm rounded-lg transition-all" href="#">
            <span class="material-symbols-outlined mr-3">assignment</span><span>Projects</span>
          </a>
          <a class="flex items-center text-secondary hover:text-primary hover:bg-primary-container/10 px-4 py-3 mx-2 font-body-sm text-body-sm rounded-lg transition-all" href="#">
            <span class="material-symbols-outlined mr-3">group</span><span>Team</span>
          </a>
          <a class="flex items-center text-secondary hover:text-primary hover:bg-primary-container/10 px-4 py-3 mx-2 font-body-sm text-body-sm rounded-lg transition-all" href="#">
            <span class="material-symbols-outlined mr-3">bar_chart</span><span>Reports</span>
          </a>
          <a class="flex items-center text-secondary hover:text-primary hover:bg-primary-container/10 px-4 py-3 mx-2 font-body-sm text-body-sm rounded-lg transition-all" href="#">
            <span class="material-symbols-outlined mr-3">settings</span><span>Settings</span>
          </a>
        </nav>
        <div class="px-4 mt-auto">
          <button id="btnNewProject" class="w-full bg-primary text-on-primary py-3 rounded-xl font-label-md text-label-md flex items-center justify-center gap-2 shadow-sm hover:opacity-90 transition-opacity">
            <span class="material-symbols-outlined">add</span>
            New Project
          </button>
        </div>
      </aside>

      <main class="flex-1 flex flex-col min-w-0">
        <!-- TopAppBar -->
        <header class="flex justify-between items-center h-16 px-gutter w-full bg-surface border-b border-outline-variant z-40">
          <div class="flex items-center gap-4 flex-1">
            <div class="relative max-w-md w-full">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
              <input class="w-full pl-10 pr-4 py-2 bg-surface-container border border-outline-variant rounded-full font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20"
                placeholder="Search tasks or files..." type="text" />
            </div>
          </div>
          <div class="flex items-center gap-4 ml-4">
            <button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors">notifications</button>
            <button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors">help_outline</button>
            <img alt="User profile" class="w-8 h-8 rounded-full border border-outline-variant object-cover"
              src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2-sF_Qd9jEF33fUrS3vMvdoA8rbw2_a6jzv7r_6oDikCkrertidHwLgqAtWuKvLnRx7Lcsi79ZYj4FBaL_pETFxeyeF27_PhXy-KnuioiYgCwYTKcWDEuZoRksSf8Jb0_ZmsxJkpTFGZ2bW8aTl5fhcA4DOHQQal_vu1KVBcizoM56dHRc7Ce_vkUul2aL96DSeDmqR4YdfGUuoIQkUF_F8AX45U05tmCFg7YyPH6xtgAx7e31u5_5e2rQxm_tgBEgnhV-LsqsEDH" />
          </div>
        </header>

        <!-- Kanban area -->
        <div class="flex-1 overflow-x-auto p-gutter custom-scrollbar">
          <div class="flex gap-gutter h-full">

            <!-- Column: To Do -->
            <div class="kanban-column flex flex-col w-1/4 h-full">
              <div class="flex items-center justify-between mb-md">
                <div class="flex items-center gap-2">
                  <h3 class="font-title-sm text-title-sm text-on-surface">To Do</h3>
                  <span class="bg-surface-container-high text-on-surface-variant px-2 py-0.5 rounded-full font-label-sm text-label-sm">0</span>
                </div>
                <button class="material-symbols-outlined text-outline">more_horiz</button>
              </div>
              <div class="flex-1 space-y-md p-2 bg-surface-container-low/50 rounded-xl overflow-y-auto custom-scrollbar"></div>
            </div>

            <!-- Column: In Progress -->
            <div class="kanban-column flex flex-col w-1/4 h-full">
              <div class="flex items-center justify-between mb-md">
                <div class="flex items-center gap-2">
                  <h3 class="font-title-sm text-title-sm text-on-surface">In Progress</h3>
                  <span class="bg-primary-container text-on-primary px-2 py-0.5 rounded-full font-label-sm text-label-sm">0</span>
                </div>
                <button class="material-symbols-outlined text-outline">more_horiz</button>
              </div>
              <div class="flex-1 space-y-md p-2 bg-surface-container-low/50 rounded-xl overflow-y-auto custom-scrollbar"></div>
            </div>

            <!-- Column: In Review -->
            <div class="kanban-column flex flex-col w-1/4 h-full">
              <div class="flex items-center justify-between mb-md">
                <div class="flex items-center gap-2">
                  <h3 class="font-title-sm text-title-sm text-on-surface">In Review</h3>
                  <span class="bg-surface-container-high text-on-surface-variant px-2 py-0.5 rounded-full font-label-sm text-label-sm">0</span>
                </div>
                <button class="material-symbols-outlined text-outline">more_horiz</button>
              </div>
              <div class="flex-1 space-y-md p-2 bg-surface-container-low/50 rounded-xl overflow-y-auto custom-scrollbar"></div>
            </div>

            <!-- Column: Done -->
            <div class="kanban-column flex flex-col w-1/4 h-full">
              <div class="flex items-center justify-between mb-md">
                <div class="flex items-center gap-2">
                  <h3 class="font-title-sm text-title-sm text-on-surface">Done</h3>
                  <span class="bg-surface-container-high text-on-surface-variant px-2 py-0.5 rounded-full font-label-sm text-label-sm">0</span>
                </div>
                <button class="material-symbols-outlined text-outline">more_horiz</button>
              </div>
              <div class="flex-1 space-y-md p-2 bg-surface-container-low/50 rounded-xl overflow-y-auto custom-scrollbar"></div>
            </div>

          </div>
        </div>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
